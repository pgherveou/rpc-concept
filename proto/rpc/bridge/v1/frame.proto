// RPC Bridge Frame Protocol
// Simplified for local IPC between collocated guest and host.
//
// COMPATIBILITY: Unknown frame types and fields are silently ignored.

syntax = "proto3";

package rpc.bridge.v1;

enum FrameType {
  FRAME_TYPE_UNSPECIFIED = 0;

  // Opens a new logical RPC stream.
  FRAME_TYPE_OPEN = 2;

  // Carries a protobuf-encoded message payload.
  FRAME_TYPE_MESSAGE = 3;

  // Signals the sender will not send any more MESSAGE frames.
  FRAME_TYPE_HALF_CLOSE = 4;

  // Signals successful completion of the stream.
  FRAME_TYPE_CLOSE = 5;

  // Requests cancellation of an active stream.
  FRAME_TYPE_CANCEL = 6;

  // Signals an error on the stream. Terminates the stream.
  FRAME_TYPE_ERROR = 7;
}

message RpcFrame {
  FrameType type = 1;

  // Logical stream identifier. 0 is reserved.
  // Odd IDs are client-initiated, even IDs reserved for future use.
  uint32 stream_id = 2;

  // Protobuf-encoded message payload (MESSAGE frames).
  bytes payload = 4;

  // Fully qualified method name: "package.ServiceName/MethodName" (OPEN frames).
  string method = 15;

  // Error code (ERROR frames).
  uint32 error_code = 20;

  // Human-readable error message (ERROR frames).
  string error_message = 21;
}
