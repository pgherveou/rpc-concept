<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RPC Bridge Demo - iOS</title>
  <style>
    .rpc-demo { font-family: -apple-system, sans-serif; max-width: 100%; padding: 12px; color: #333; }
    h1 { font-size: 1.3rem; border-bottom: 2px solid #4a90d9; padding-bottom: 8px; }
    h2 { font-size: 1rem; color: #4a90d9; margin-top: 16px; }
    .section { margin-bottom: 12px; }
    .row { display: flex; gap: 6px; margin: 6px 0; align-items: center; flex-wrap: wrap; }
    input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; min-width: 120px; }
    button { padding: 8px 12px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .log-panel { background: #1e1e1e; color: #d4d4d4; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; min-height: 80px; }
    .chat-panel { min-height: 100px; max-height: 150px; }
    .log-entry { margin: 2px 0; }
    .log-error { margin: 2px 0; color: #f44; }
    .chat-entry { margin: 2px 0; color: #8cd; }
  </style>
</head>
<body>
  <div id="app">
    <p>Connecting to native bridge...</p>
  </div>
  <script src="product.js"></script>
  <script src="bootstrap.js"></script>
</body>
</html>
