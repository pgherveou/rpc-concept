<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruAPI Host Playground</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f5f5; }
    #status { padding: 8px 16px; background: #333; color: #aaa; font-size: 13px; }
    #status.connected { color: #4caf50; }
    iframe { width: 100%; height: calc(100vh - 36px); border: none; }
  </style>
</head>
<body>
  <div id="status">Initializing...</div>
  <iframe id="client-frame" sandbox="allow-scripts"></iframe>
  <script src="host.js"></script>
</body>
</html>
