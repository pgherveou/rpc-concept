// Demo Chat Service
// Demonstrates bidirectional-streaming RPC.

syntax = "proto3";

package demo.hello.v1;

// --- Bidi-streaming RPC messages ---

message ChatMessage {
  string from = 1;
  string text = 2;
  uint64 seq = 3;
  uint64 timestamp = 4;
}

// ChatService provides real-time bidirectional chat.
service ChatService {
  // Bidirectional streaming: Real-time chat.
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}
